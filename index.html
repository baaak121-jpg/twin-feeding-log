<!DOCTYPE html>
<html lang="ko">

<title>쌍둥이 수유+똥 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--card:#fff;--primary:#e8b4bc;--primary-dark:#d4969e;--accent:#a8c5d4;--text:#3d3d3d;--text-soft:#777;--border:#eee;--shadow:rgba(0,0,0,.06)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem;line-height:1.5;-webkit-tap-highlight-color:transparent}.app{max-width:480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:1rem}header h1{font-size:1.4rem;font-weight:700}
.btn-reload{padding:.3rem .7rem;font-size:.75rem;font-family:inherit;border:1px solid #c0c0c0;border-radius:6px;background:linear-gradient(to bottom,#f8f8f8,#e8e8e8);color:#555;cursor:pointer;white-space:nowrap;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.08)}.btn-reload:hover{background:linear-gradient(to bottom,#eee,#ddd);color:#333;border-color:#aaa}.btn-reload:active{transform:scale(.96);box-shadow:none}

.code-wrap{position:relative;flex-shrink:0}.code-wrap .code-label{position:absolute;top:-.4rem;left:50%;transform:translateX(-50%);font-size:.55rem;color:var(--text-soft);background:var(--card);padding:0 .25rem;white-space:nowrap;pointer-events:none;z-index:1}.code-wrap .code-input{width:4.5rem;padding:.4rem .3rem;font-size:1rem;text-align:center;border:1px solid var(--border);border-radius:8px;font-family:inherit;letter-spacing:.2rem}
.top-bar .btn-code{padding:.4rem .6rem;font-size:.8rem;font-family:inherit;border:none;border-radius:8px;background:#888;color:#fff;cursor:pointer;white-space:nowrap;transition:all .15s}.top-bar .btn-code:hover{background:#777}.top-bar .btn-code.connected{background:#5a9;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.15)}.top-bar .btn-code.connected:hover{background:#498}
.code-status{font-size:.7rem;color:var(--text-soft);min-width:0;white-space:nowrap}
.top-bar .date-sep{width:1px;height:1.5rem;background:var(--border);flex-shrink:0}.top-bar .date-input{flex:1;min-width:0;padding:.4rem .5rem;font-size:.9rem;border:1px solid var(--border);border-radius:8px;font-family:inherit}.top-bar .btn-date-nav{padding:.3rem .35rem;font-size:.8rem;border:none;border-radius:6px;background:var(--bg);color:var(--text-soft);cursor:pointer;line-height:1;flex-shrink:0}.top-bar .btn-date-nav:hover{background:var(--border);color:var(--text)}
.name-modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}.name-modal-overlay.open{display:flex}.name-modal{background:#fff;border-radius:12px;padding:1.5rem;width:280px;box-shadow:0 8px 30px rgba(0,0,0,.15)}.name-modal h3{font-size:1rem;margin-bottom:.75rem;text-align:center}.name-modal input{width:100%;padding:.6rem .75rem;font-size:1rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;margin-bottom:.75rem}.name-modal button{width:100%;padding:.65rem;font-size:.95rem;font-family:inherit;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer}

.time-edit-inputs{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.75rem}.time-edit-inputs select{padding:.6rem .5rem;font-size:1rem;border:1px solid var(--border);border-radius:8px;font-family:inherit;background:var(--card);color:var(--text);text-align:center;text-align-last:center}.time-edit-inputs span{font-size:1.2rem;font-weight:600;color:var(--text-soft)}
.confirm-btns{display:flex;gap:.5rem}.confirm-btns button{flex:1;padding:.6rem;font-size:.95rem;font-family:inherit;border:none;border-radius:8px;cursor:pointer}.confirm-btns .btn-yes{background:#c44;color:#fff}.confirm-btns .btn-no{background:var(--bg);color:var(--text)}
.view-toggle{display:flex;gap:.5rem;margin-bottom:1rem}.view-btn{flex:1;padding:.6rem;font-size:.9rem;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-soft);cursor:pointer;transition:all .2s}.view-btn:hover{background:var(--border);color:var(--text)}.view-btn.active{background:#666;border-color:#555;color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.view-panel.hidden{display:none!important}
.split-section{padding:.75rem .5rem}
.daily-total{display:flex;align-items:center;gap:0;font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:.5rem;padding:.5rem .6rem;border-radius:8px;border:1px solid var(--border);background:var(--bg)}.total-side{flex:1;line-height:1.5;white-space:nowrap}.total-left{text-align:left;color:#4a7a93;font-weight:600}.total-right{text-align:right;color:#b4506e;font-weight:600}.total-center{padding:0 .4rem;font-weight:700;color:#555;font-size:.85rem;flex-shrink:0}
.split-table-wrap{overflow-x:auto;margin-top:.5rem}.split-table{width:100%;border-collapse:collapse;font-size:.85rem;table-layout:fixed}.split-table th,.split-table td{padding:.5rem .3rem;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}.split-table th{font-weight:600;color:var(--text);background:var(--bg)}.split-table th.col-time{width:3.8rem;color:var(--text-soft)}.split-table th:nth-child(1),.split-table th:nth-child(3){width:calc((100% - 3.8rem)/2)}.split-table td.col-time{font-weight:500;color:var(--text-soft);cursor:pointer;-webkit-user-select:none;user-select:none}.split-table td.col-time:active{background:#e8e8e8}.split-table th:nth-child(1),.split-table td:nth-child(1){background:#f1f7fb}.split-table th:nth-child(3),.split-table td:nth-child(3){background:#fff4f6}.split-table th.col-time,.split-table td.col-time{background:#f7f7f7}
.split-section #empty-split{margin-top:.5rem}
.cell-td{vertical-align:middle}.cell-flex{display:flex;align-items:center;justify-content:flex-start;gap:.1rem;padding:0 1.5rem}.cell-flex .cell-item-poop{margin-left:auto}.cell-item{display:inline-flex;align-items:center;gap:.25rem;margin:0 .15rem;position:relative;padding:.15rem .25rem;border-radius:4px;cursor:pointer}.cell-item:hover{background:var(--bg)}.cell-item .btn-delete-cell,.cell-item .btn-edit-cell{display:none;width:1.25rem;height:1.25rem;padding:0;border:none;border-radius:50%;color:#fff;font-size:1rem;line-height:1;cursor:pointer;font-family:inherit;align-items:center;justify-content:center;flex-shrink:0}.cell-item .btn-delete-cell{background:var(--primary-dark)}.cell-item .btn-edit-cell{background:#999}.cell-item:hover .btn-delete-cell,.cell-item:hover .btn-edit-cell{display:inline-flex}.cell-item .btn-delete-cell:hover{background:#c44}.cell-item .btn-edit-cell:hover{background:#666}.cell-item.show-delete .btn-delete-cell,.cell-item.show-delete .btn-edit-cell{display:inline-flex}
section{background:var(--card);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px var(--shadow)}section h2{font-size:.95rem;font-weight:500;color:var(--text-soft);margin-bottom:.75rem}
.add-row{display:flex;gap:.3rem;margin-bottom:1.1rem;margin-top:.2rem;align-items:center}
.time-picker{display:flex;align-items:center;gap:.15rem;flex:0 0 auto}.time-picker select{padding:.6rem .25rem;font-size:.88rem;border:1px solid var(--border);border-radius:6px;font-family:inherit;background:var(--card);color:var(--text)}.time-picker #feeding-hour,.time-picker #feeding-minute{width:2.6rem;text-align:center;text-align-last:center}.time-picker .time-sep{font-weight:600;color:var(--text-soft);font-size:1rem}
.vol-wrap{display:flex;align-items:stretch;flex:1;min-width:3.5rem;gap:.25rem}.vol-wrap #feeding-volume{flex:1;min-width:2rem;padding:.6rem .2rem;font-size:.95rem;text-align:center;border:1px solid var(--border);border-radius:6px;font-family:inherit;-moz-appearance:textfield;outline:none;-webkit-appearance:none;appearance:none}.vol-wrap #feeding-volume:focus{border-color:#aaa;background:#fafafa}.vol-wrap #feeding-volume::-webkit-inner-spin-button,.vol-wrap #feeding-volume::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}.vol-wrap #feeding-volume::placeholder{color:var(--text-soft);text-align:center}.vol-unit{display:flex;align-items:center;justify-content:center;min-width:2.2rem;padding:0 .3rem;font-size:.7rem;color:var(--text-soft);background:var(--bg);border:1px solid var(--border);border-radius:6px;white-space:nowrap;flex-shrink:0}
.mode-toggle{display:flex;flex-shrink:0}.mode-btn{padding:.55rem .5rem;border:1px solid var(--border);background:var(--bg);cursor:pointer;line-height:1;transition:all .15s;-webkit-user-select:none;user-select:none;font-size:.95rem}.mode-btn:first-child{border-radius:6px 0 0 6px}.mode-btn:last-child{border-radius:0 6px 6px 0}.mode-btn.active{background:linear-gradient(145deg,#d4d4d4,#b8b8b8);border-color:#777;box-shadow:0 2px 6px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.4);transform:translateY(-1px)}

.baby-tabs-wrap{margin-bottom:1.2rem}.baby-tabs{display:flex;gap:.5rem}.baby-btn{flex:1;padding:.6rem;font-size:.9rem;font-family:inherit;border:2px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text-soft);cursor:pointer;transition:all .2s}.baby-btn:hover{opacity:.85}
.baby-btn[data-baby="1"]{border-color:#a8c5d4;color:#5a8aa3}.baby-btn[data-baby="1"].active{background:linear-gradient(145deg,#9fc4d6,#7fadbf);color:#fff;box-shadow:0 4px 12px rgba(90,138,163,.5),inset 0 1px 0 rgba(255,255,255,.3);border-color:#6a9ab5;transform:translateY(-1px)}

.baby-btn[data-baby="both"]{border-color:#c4aedd;color:#8b6aad}.baby-btn[data-baby="both"].active{background:linear-gradient(145deg,#b89dd4,#9a7dba);color:#fff;box-shadow:0 4px 12px rgba(139,106,173,.5),inset 0 1px 0 rgba(255,255,255,.3);border-color:#7d5c9a;transform:translateY(-1px)}
.baby-tab-group{display:flex;flex:1;gap:0}.baby-tab-group .baby-btn{border-top-right-radius:0;border-bottom-right-radius:0;flex:1}.btn-edit-name{padding:0 .45rem;font-size:.85rem;font-family:inherit;border:2px solid var(--border);border-left:none;border-radius:0 8px 8px 0;background:var(--bg);color:var(--text-soft);cursor:pointer;transition:all .2s;line-height:1}.btn-edit-name:hover{background:var(--border);color:var(--text)}
.baby-tab-group:first-child .btn-edit-name{border-color:#a8c5d4}.baby-tab-group:nth-child(2) .btn-edit-name{border-color:#e8b4bc}
.add-btn-row{display:flex;gap:.5rem;align-items:center}.btn-add{flex:1;padding:.85rem;font-size:1rem;font-weight:600;font-family:inherit;border:none;border-radius:8px;background:#666;color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.15)}.btn-add:hover{background:#555;box-shadow:0 3px 8px rgba(0,0,0,.2)}.btn-add:active{transform:scale(.98);box-shadow:0 1px 3px rgba(0,0,0,.15)}.btn-ai{padding:.85rem 1rem;font-size:.85rem;font-weight:600;font-family:inherit;border:2px solid #7b68ee;border-radius:8px;background:linear-gradient(135deg,#9b88ff,#7b68ee);color:#fff;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(123,104,238,.3);white-space:nowrap}.btn-ai:hover{background:linear-gradient(135deg,#8b78ef,#6b58de);box-shadow:0 3px 8px rgba(123,104,238,.4)}.btn-ai:active{transform:scale(.98);box-shadow:0 1px 3px rgba(123,104,238,.3)}
.feeding-list{list-style:none}.feeding-list li{display:flex;align-items:center;padding:.65rem 0;border-bottom:1px solid var(--border);font-size:.9rem}.feeding-list li:last-child{border-bottom:none}.feeding-list .time{width:16%;text-align:center;flex-shrink:0;font-weight:500}.feeding-list .baby-badge{width:17%;text-align:center;flex-shrink:0;font-size:.78rem;padding:.2rem 0;border-radius:20px;color:#fff}.feeding-list .baby-badge.b1{background:#a8c5d4}.feeding-list .baby-badge.b2{background:#e8b4bc}.feeding-list .volume{width:32%;text-align:left;flex-shrink:0;font-size:.88rem;color:var(--text-soft);padding-left:2.5rem}.feeding-list .poop-col{width:2.2rem;text-align:center;flex-shrink:0;font-size:.88rem;margin-left:.3rem}.feeding-list .btn-delete{margin-left:auto;flex-shrink:0;padding:.3rem .5rem;font-size:.75rem;border:none;border-radius:6px;background:var(--bg);color:var(--text-soft);cursor:pointer;font-family:inherit}.feeding-list .btn-delete:hover{background:#f0e6e6;color:#c44}
.empty-msg{text-align:center;color:var(--text-soft);font-size:.9rem;padding:1.5rem;display:none}.empty-msg.visible{display:block}
.stats-section{padding:.75rem 1rem}.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}.week-nav .week-title{font-size:.95rem;font-weight:600;color:var(--text)}.week-nav button{padding:.4rem .7rem;font-size:.8rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;font-family:inherit;transition:all .15s}.week-nav button:hover{background:var(--border)}
.stats-table-wrap{margin-bottom:1.5rem;overflow-x:auto}.stats-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:8px;overflow:hidden}.stats-table th,.stats-table td{padding:.75rem .5rem;text-align:center;border-bottom:1px solid var(--border)}.stats-table thead th{background:var(--bg);font-weight:600;font-size:.85rem;color:var(--text)}.stats-table .stat-name-left{background:#e8f3f8;color:#5a8aa3}.stats-table .stat-name-right{background:#fce8eb;color:#c4707e}.stats-table .stat-category{background:var(--bg);color:var(--text-soft);font-size:.8rem}.stats-table .stat-label{background:var(--bg);color:var(--text-soft);font-size:.8rem;font-weight:500}.stats-table .stat-value-left{background:#f5f9fb;color:#5a8aa3;font-weight:600;font-size:.95rem}.stats-table .stat-value-right{background:#fef5f6;color:#c4707e;font-weight:600;font-size:.95rem}.stats-table tbody tr:last-child td{border-bottom:none}.stats-note{font-size:.7rem;color:var(--text-soft);text-align:right;margin-top:.4rem;padding-right:.5rem}
.chart-container{margin-bottom:1.5rem}.chart-title{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:.5rem;text-align:center}.chart-wrapper{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;position:relative}.chart-legend-inner{position:absolute;top:.5rem;right:.5rem;display:flex;gap:.5rem;font-size:.7rem;z-index:10}.legend-item{display:flex;align-items:center;gap:.25rem}.legend-color{width:.65rem;height:.65rem;border-radius:2px;display:inline-block}.legend-color.baby1{background:linear-gradient(135deg,#a8c5d4,#7fadbf)}.legend-color.baby2{background:linear-gradient(135deg,#e8b4bc,#cc8591)}.chart-bars{display:flex;align-items:flex-end;justify-content:space-around;height:180px;gap:.5rem}.chart-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;max-width:3.5rem;height:100%}.bar-group{display:flex;width:100%;gap:.25rem;align-items:flex-end;justify-content:center;flex:1}.bar-fill-wrapper{position:relative;display:flex;flex-direction:column;align-items:center;width:.85rem}.bar-fill{width:100%;background:linear-gradient(180deg,#a8c5d4,#7fadbf);border-radius:3px 3px 0 0;transition:all .3s;min-height:3px}.bar-fill.baby2{background:linear-gradient(180deg,#e8b4bc,#cc8591)}.bar-label-top{position:absolute;top:-1.3rem;font-size:.65rem;font-weight:600;white-space:nowrap}.bar-label-top.baby1{color:#5a8aa3}.bar-label-top.baby2{color:#c4707e}.bar-label{font-size:.7rem;color:var(--text-soft);font-weight:500;flex-shrink:0}.bar-date{font-size:.6rem;color:var(--text-soft);flex-shrink:0}
.ai-modal-content{width:320px!important;max-width:90vw}.ai-listening{display:flex;justify-content:center;align-items:center;padding:2rem;min-height:120px}.ai-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#9b88ff,#7b68ee);animation:pulse 1.5s ease-in-out infinite;box-shadow:0 0 20px rgba(123,104,238,.5)}@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}.ai-result{padding:.5rem 0}.ai-field{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}.ai-field label{min-width:50px;font-size:.9rem;font-weight:500;color:var(--text-soft)}.ai-field select,.ai-field input[type="number"]{flex:1;padding:.5rem;font-size:.9rem;border:1px solid var(--border);border-radius:6px;font-family:inherit;background:var(--card)}.ai-field input[type="checkbox"]{width:20px;height:20px;cursor:pointer}.ai-time-inputs{display:flex;align-items:center;gap:.3rem;flex:1}.ai-time-inputs select{flex:1;text-align:center;text-align-last:center}.ai-time-inputs span{font-weight:600;color:var(--text-soft)}.ai-buttons{display:flex;gap:.5rem;margin-top:1rem}.ai-buttons button{flex:1;padding:.65rem;font-size:.9rem;font-family:inherit;border:none;border-radius:8px;cursor:pointer;transition:all .15s}#ai-cancel{background:var(--bg);color:var(--text)}#ai-retry{background:#ffa500;color:#fff}#ai-confirm{background:#5a9;color:#fff}#ai-cancel:hover{background:var(--border)}#ai-retry:hover{background:#ff8c00}#ai-confirm:hover{background:#498}.debug-wrap{margin-top:1rem}.debug-summary{font-size:.7rem;color:#bbb;cursor:pointer;padding:.3rem .5rem;user-select:none;-webkit-user-select:none}#debug-box{font-size:.7rem;color:#999;text-align:left;padding:.5rem;white-space:pre-wrap;word-break:break-all;max-height:150px;overflow:auto}

<body>
<div class="app">
  <header>
    <h1>쌍둥이 수유+똥 기록</h1>
    <button type="button" class="btn-reload" id="btn-reload">새로고침</button>
  </header>
  <div class="top-bar">
    <div class="code-wrap">
      <span class="code-label">가족코드</span>
      <input type="text" class="code-input" id="family-code" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="0000">
    </div>
    <button type="button" class="btn-code" id="btn-code-apply">연결</button>
    <span class="code-status" id="code-status"></span>
    <span class="date-sep"></span>
    <button type="button" class="btn-date-nav" id="btn-prev-day" title="이전 날">◀</button>
    <input type="date" class="date-input" id="log-date">
    <button type="button" class="btn-date-nav" id="btn-next-day" title="다음 날">▶</button>
  </div>
  <div class="api-key-bar">
    <div class="code-wrap">
      <span class="code-label">OpenAI API Key</span>
      <input type="password" class="api-key-input" id="openai-api-key" placeholder="sk-...">
    </div>
    <button type="button" class="btn-code" id="btn-api-save">저장</button>
    <span class="code-status" id="api-status"></span>
  </div>
  <!-- 이름 변경 모달 -->
  <div class="name-modal-overlay" id="name-modal">
    <div class="name-modal">
      <h3 id="name-modal-title">이름 변경</h3>
      <input type="text" id="name-modal-input" placeholder="이름 입력" maxlength="20">
      <button type="button" id="name-modal-save">확인</button>
    </div>
  </div>
  <!-- 수유량 수정 모달 -->
  <div class="name-modal-overlay" id="edit-modal">
    <div class="name-modal">
      <h3 id="edit-modal-title">수유량 수정</h3>
      <input type="number" id="edit-modal-input" min="0" step="10" inputmode="numeric" placeholder="용량(ml)">
      <div class="edit-modal-btns">
        <button type="button" id="edit-modal-save">확인</button>
        <button type="button" id="edit-modal-delete" class="btn-modal-delete">삭제</button>
      </div>
    </div>
  </div>
  <!-- 시간 수정 모달 -->
  <div class="name-modal-overlay" id="time-edit-modal">
    <div class="name-modal">
      <h3 id="time-edit-modal-title">시간 수정</h3>
      <div class="time-edit-inputs">
        <select id="time-edit-hour"></select>
        <span>:</span>

/* ── Data helpers ── */
function getLogsForDate(ds){
  var o=allLogs[ds]||{};var keys=Object.keys(o);var r=[];
  for(var i=0;i<keys.length;i++){var k=keys[i];var lg=o[k];
    r.push({time:lg.time,baby:lg.baby,volume:lg.volume!=null?lg.volume:null,poop:!!lg.poop,unit:lg.unit||'ml',_key:k});
  }
  r.sort(function(a,b){return a.time<b.time?-1:a.time>b.time?1:0;});
  return r;
}

function findExistingKeys(ds,time,baby,isPoop){
  var o=allLogs[ds]||{};var keys=Object.keys(o);var found=[];
  for(var i=0;i<keys.length;i++){var k=keys[i];var lg=o[k];
    if(lg.time!==time) continue;
    var match=false;
    if(lg.baby===baby) match=true;
    else if(baby==='both'&&(lg.baby==='1'||lg.baby==='2')) match=true;
    else if(lg.baby==='both'&&(baby==='1'||baby==='2')) match=true;
    if(!match) continue;
    if(isPoop&&lg.poop) found.push(k);
    if(!isPoop&&!lg.poop&&lg.volume!=null) found.push(k);
  }
  return found;
}

function updateLogTime(ds,oldTime,newTime){
  if(!logsRef)return;
  var dayLogs=allLogs[ds]||{};
  var toUpdate=[];
  for(var key in dayLogs){
    if(dayLogs[key].time===oldTime){
      toUpdate.push(key);
    }
  }
  for(var i=0;i<toUpdate.length;i++){
    logsRef.child(ds).child(toUpdate[i]).update({time:newTime});
  }
  _log('TIME-UPDATE: '+ds+' '+oldTime+' -> '+newTime+' ('+toUpdate.length+' logs)');
}

function addLog(ds,time,baby,vol,poop,unit){
  if(!logsRef)return;
  var v=(vol!==''&&vol!==undefined&&vol!==null)?Number(vol):null;
  var isPoop=!!poop;
  var u=unit||'ml';
  var existKeys=findExistingKeys(ds,time,baby,isPoop);
  if(existKeys.length>0){
    var updates={time:time,baby:baby,poop:isPoop};
    if(!isPoop&&v!==null&&!isNaN(v)){updates.volume=v;updates.unit=u;}
    logsRef.child(ds).child(existKeys[0]).update(updates);
    for(var i=1;i<existKeys.length;i++){logsRef.child(ds).child(existKeys[i]).remove();}
    _log('D: update '+ds+' '+time+' '+baby);
  }else{
    var e={time:time,baby:baby,poop:isPoop};
    if(!isPoop&&v!==null&&!isNaN(v)){e.volume=v;e.unit=u;}
    logsRef.child(ds).push(e);
    _log('D: push '+ds+' '+time+' '+baby);
  }
}

function removeLog(ds,key,fromBaby){
  if(!logsRef)return;
  var ref=logsRef.child(ds).child(key);
  var o=allLogs[ds]||{};var lg=o[key];if(!lg)return;
  if(lg.baby==='both'&&fromBaby){ref.update({baby:fromBaby==='1'?'2':'1'});}
  else{ref.remove();}
}

function getDailyTotals(ds){
  var logs=getLogsForDate(ds);
  var fV=0,sV=0,fC=0,sC=0,fM=0,sM=0,fMC=0,sMC=0,fP=0,sP=0;
  for(var i=0;i<logs.length;i++){var lg=logs[i];
    var isFeed=lg.volume!=null&&!lg.poop;
    var isPoop=lg.poop;
    var v=lg.volume!=null?lg.volume:0;
    var isMin=lg.unit==='min';
    if(lg.baby==='1'||lg.baby==='both'){
      if(isFeed){if(isMin){fM+=v;fMC++;}else{fV+=v;fC++;}}
      if(isPoop)fP++;
    }
    if(lg.baby==='2'||lg.baby==='both'){
      if(isFeed){if(isMin){sM+=v;sMC++;}else{sV+=v;sC++;}}
      if(isPoop)sP++;
    }
  }
  return{fVol:fV,sVol:sV,fCnt:fC,sCnt:sC,fMin:fM,sMin:sM,fMinCnt:fMC,sMinCnt:sMC,fPoop:fP,sPoop:sP};
}

  fH+='<br>💩'+t.fPoop+'회';

  if(t.sMinCnt>0)sH+=' 🤱'+t.sMin+'분·'+t.sMinCnt+'회';

}

  code=code.replace(/[^0-9]/g,'');
  if(code.length!==4){codeStatusEl.textContent='4자리 숫자를 입력하세요';return;}
  detachListeners();
  familyCode=code;

  namesRef=db.ref('families/'+code+'/names');
  allLogs={};babyNames={first:'',second:''};

  codeStatusEl.textContent='';
  codeInput.value=code;
  btnCodeApply.textContent='연결됨';
  btnCodeApply.className='btn-code connected';
  attachListeners();
  _log('CODE: '+code);
}

var currentWeekStart = null;
var btnPrevWeek = document.getElementById('btn-prev-week');
var btnNextWeek = document.getElementById('btn-next-week');
var weekTitleEl = document.getElementById('week-title');

function getWeekStart(date){
  var d = new Date(date);
  var day = d.getDay();
  var diff = day === 0 ? 0 : -day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDates(startDate){
  var dates = [];
  for(var i=0; i<7; i++){
    var d = new Date(startDate);
    d.setDate(d.getDate() + i);
    dates.push(d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()));
  }
  return dates;
}

function getWeekLabel(startDate){
  var d = new Date(startDate);
  var endDate = new Date(d);
  endDate.setDate(endDate.getDate() + 6);
  var startMonth = d.getMonth() + 1;
  var startDay = d.getDate();
  var endMonth = endDate.getMonth() + 1;
  var endDay = endDate.getDate();
  return startMonth + '.' + startDay + '~' + endMonth + '.' + endDay;
}

function renderStats(){
  if(!currentWeekStart){
    currentWeekStart = getWeekStart(new Date());
  }
  weekTitleEl.textContent = getWeekLabel(currentWeekStart);
  
  var weekDates = getWeekDates(currentWeekStart);
  var weekData = {sun:[],mon:[],tue:[],wed:[],thu:[],fri:[],sat:[]};
  var dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
  
  for(var i=0; i<weekDates.length; i++){
    var ds = weekDates[i];
    var dayLogs = allLogs[ds] || {};
    var dayStats = {first:{ml:0,min:0,poop:0,mlCnt:0,minCnt:0}, second:{ml:0,min:0,poop:0,mlCnt:0,minCnt:0}};
    var logCount = 0;
    for(var k in dayLogs)logCount++;
    if(logCount>0)_log('DAY-DEBUG: '+ds+' has '+logCount+' logs');
    
    for(var key in dayLogs){
      var log = dayLogs[key];
      var baby = log.baby;
      _log('LOG-DEBUG: date='+ds+' baby='+baby+' poop='+log.poop+' vol='+log.volume);
      if(log.poop){
        _log('POOP-FOUND: date='+ds+' baby='+baby);
        if(baby==='1'||baby==='both'){
          dayStats.first.poop++;
        }
        if(baby==='2'||baby==='both'){
          dayStats.second.poop++;
        }
      }
      if(log.volume&&log.volume!==''){
        var vol = parseInt(log.volume,10)||0;
        var unit = log.unit||'ml';
        if(baby==='1'||baby==='both'){
          if(unit==='ml'){dayStats.first.ml+=vol;dayStats.first.mlCnt++;}
          else{dayStats.first.min+=vol;dayStats.first.minCnt++;}
        }
        if(baby==='2'||baby==='both'){
          if(unit==='ml'){dayStats.second.ml+=vol;dayStats.second.mlCnt++;}
          else{dayStats.second.min+=vol;dayStats.second.minCnt++;}
        }
      }
    }
    weekData[dayNames[i]] = dayStats;
  }
  
  var totalFirst = {ml:0,min:0,poop:0,mlCnt:0,minCnt:0};
  var totalSecond = {ml:0,min:0,poop:0,mlCnt:0,minCnt:0};
  var todayDate = todayStr();
  var daysToCount = 0;
  
  for(var i=0; i<weekDates.length; i++){
    var dateStr = weekDates[i];
    if(dateStr < todayDate){
      daysToCount++;
      var dn = dayNames[i];
      var ds = weekData[dn];
      totalFirst.ml += ds.first.ml;
      totalFirst.min += ds.first.min;
      totalFirst.poop += ds.first.poop;
      totalFirst.mlCnt += ds.first.mlCnt;
      totalFirst.minCnt += ds.first.minCnt;
      totalSecond.ml += ds.second.ml;
      totalSecond.min += ds.second.min;
      totalSecond.poop += ds.second.poop;
      totalSecond.mlCnt += ds.second.mlCnt;
      totalSecond.minCnt += ds.second.minCnt;
    }
  }
  
  if(daysToCount === 0) daysToCount = 1;
  
  var avgFirstMl = Math.round(totalFirst.ml / daysToCount);
  var avgFirstCnt = Math.round((totalFirst.mlCnt + totalFirst.minCnt) / daysToCount * 10) / 10;
  var avgSecondMl = Math.round(totalSecond.ml / daysToCount);
  var avgSecondCnt = Math.round((totalSecond.mlCnt + totalSecond.minCnt) / daysToCount * 10) / 10;
  var avgFirstPoop = Math.round(totalFirst.poop / daysToCount * 10) / 10;
  var avgSecondPoop = Math.round(totalSecond.poop / daysToCount * 10) / 10;
  
  _log('STATS: today='+todayDate+' days='+daysToCount+' 1st.poop='+totalFirst.poop+' 2nd.poop='+totalSecond.poop+' 1st.ml='+totalFirst.ml+' 2nd.ml='+totalSecond.ml);
  
  var names = getDisplayNames();
  document.getElementById('stat-name-first').textContent = names.first;
  document.getElementById('stat-name-second').textContent = names.second;
  document.getElementById('stat-first-ml').textContent = avgFirstMl + 'ml (' + avgFirstCnt + '회)';
  document.getElementById('stat-second-ml').textContent = avgSecondMl + 'ml (' + avgSecondCnt + '회)';
  document.getElementById('stat-first-poop').textContent = avgFirstPoop + '회';
  document.getElementById('stat-second-poop').textContent = avgSecondPoop + '회';
  
  document.getElementById('legend-first').textContent = names.first;
  document.getElementById('legend-second').textContent = names.second;
  var el1=document.getElementById('legend-first-poop-2');
  var el2=document.getElementById('legend-second-poop-2');
  if(el1)el1.textContent = names.first;
  if(el2)el2.textContent = names.second;
  
  renderChart('chart-volume', weekData, 'ml');
  renderChart('chart-poop', weekData, 'poop');
}

function renderChart(containerId, weekData, type){
  var container = document.getElementById(containerId);
  if(!container)return;
  container.innerHTML = '';
  
  var dayNames = ['sun','mon','tue','wed','thu','fri','sat'];
  var dayLabels = ['일','월','화','수','목','금','토'];
  var maxVal = type==='poop' ? 7 : 1200;
  var weekDates = getWeekDates(currentWeekStart);
  
  for(var i=0; i<dayNames.length; i++){
    var dn = dayNames[i];
    var ds = weekData[dn];
    var val1 = type==='poop' ? ds.first.poop : ds.first.ml;
    var val2 = type==='poop' ? ds.second.poop : ds.second.ml;
    var height1 = Math.round((val1 / maxVal) * 100);
    var height2 = Math.round((val2 / maxVal) * 100);
    
    var dateStr = weekDates[i];
    var dateParts = dateStr.split('-');
    var monthDay = dateParts[1]+'.'+dateParts[2];
    
    var barHtml = '<div class="chart-bar">';
    barHtml += '<div class="bar-group">';
    barHtml += '<div class="bar-fill-wrapper" style="height:'+height1+'%">';
    barHtml += '<div class="bar-fill" style="height:100%"></div>';
    if(val1>0)barHtml += '<div class="bar-label-top baby1">'+val1+'</div>';
    barHtml += '</div>';
    barHtml += '<div class="bar-fill-wrapper" style="height:'+height2+'%">';
    barHtml += '<div class="bar-fill baby2" style="height:100%"></div>';
    if(val2>0)barHtml += '<div class="bar-label-top baby2">'+val2+'</div>';
    barHtml += '</div>';
    barHtml += '</div>';
    barHtml += '<div class="bar-label">'+dayLabels[i]+'</div>';
    barHtml += '<div class="bar-date">'+monthDay+'</div>';
    barHtml += '</div>';
    container.innerHTML += barHtml;
  }
}

btnNextWeek.addEventListener('click', function(){
  var d = new Date(currentWeekStart);
  d.setDate(d.getDate() + 7);
  currentWeekStart = d;
  renderStats();
});

/* ── AI Voice Recognition with OpenAI ── */
var mediaRecorder = null;
var audioChunks = [];

function initAISelects(){
  aiHourSelect.innerHTML = '';
  aiMinuteSelect.innerHTML = '';
  for(var h=0; h<24; h++){
    var opt = document.createElement('option');
    opt.value = pad2(h);
    opt.textContent = pad2(h);
    aiHourSelect.appendChild(opt);
  }
  for(var m=0; m<60; m+=5){
    var opt2 = document.createElement('option');
    opt2.value = pad2(m);
    opt2.textContent = pad2(m);
    aiMinuteSelect.appendChild(opt2);
  }
}

function parseWithGPT(transcript, callback){
  if(!openaiApiKey){
    alert('OpenAI API 키를 먼저 저장해주세요.');
    return;
  }
  
  var names = getDisplayNames();
  var prompt = '다음 음성 텍스트에서 수유 기록 정보를 추출해주세요.\n\n';
  prompt += '아기 이름: "'+names.first+'" (첫째), "'+names.second+'" (둘째), "둘 다"\n';
  prompt += '음성 텍스트: "'+transcript+'"\n\n';
  prompt += 'JSON 형식으로만 응답해주세요:\n';
  prompt += '{\n';
  prompt += '  "baby": "1" 또는 "2" 또는 "both" (아기 선택),\n';
  prompt += '  "hour": 시간 (0-23),\n';
  prompt += '  "minute": 분 (0, 5, 10, ..., 55),\n';
  prompt += '  "unit": "ml" 또는 "min" 또는 null,\n';
  prompt += '  "volume": 숫자 또는 null,\n';
  prompt += '  "poop": true 또는 false\n';
  prompt += '}\n\n';
  prompt += '규칙:\n';
  prompt += '- 아기 이름이 "'+names.first+'"이면 baby="1", "'+names.second+'"이면 baby="2"\n';
  prompt += '- "첫째"는 baby="1", "둘째"는 baby="2", "둘 다"/"모두"는 baby="both"\n';
  prompt += '- 분유/ml이면 unit="ml", 모유/분이면 unit="min"\n';
  prompt += '- 똥/응가/대변이 언급되면 poop=true\n';
  prompt += '- 시간이 없으면 현재 시간 사용\n';
  prompt += '- 분은 5분 단위로 반올림';
  
  _log('GPT-PROMPT: '+prompt.substring(0,100)+'...');
  
  fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + openaiApiKey
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      messages: [{role: 'user', content: prompt}],
      temperature: 0.3,
      max_tokens: 200
    })
  })
  .then(function(res){
    if(!res.ok){
      throw new Error('GPT API error: '+res.status);
    }
    return res.json();
  })
  .then(function(data){
    _log('GPT-RESPONSE: '+JSON.stringify(data));
    var content = data.choices[0].message.content;
    var jsonMatch = content.match(/\{[\s\S]*\}/);
    if(jsonMatch){
      var parsed = JSON.parse(jsonMatch[0]);
      callback(parsed);
    } else {
      throw new Error('JSON parsing failed');
    }
  })
  .catch(function(err){
    _log('GPT-ERROR: '+err.message);
    alert('GPT 파싱 오류: '+err.message);
    aiModal.classList.remove('open');
  });
}

function transcribeWithWhisper(audioBlob, callback){
  if(!openaiApiKey){
    alert('OpenAI API 키를 먼저 저장해주세요.');
    return;
  }
  
  var formData = new FormData();
  formData.append('file', audioBlob, 'audio.webm');
  formData.append('model', 'whisper-1');
  formData.append('language', 'ko');
  
  _log('WHISPER: sending audio...');
  
  fetch('https://api.openai.com/v1/audio/transcriptions', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + openaiApiKey
    },
    body: formData
  })
  .then(function(res){
    if(!res.ok){
      throw new Error('Whisper API error: '+res.status);
    }
    return res.json();
  })
  .then(function(data){
    _log('WHISPER-RESULT: '+data.text);
    callback(data.text);
  })
  .catch(function(err){
    _log('WHISPER-ERROR: '+err.message);
    alert('음성 인식 오류: '+err.message);
    aiModal.classList.remove('open');
  });
}

function startVoiceRecording(){
  if(!openaiApiKey){
    alert('OpenAI API 키를 먼저 저장해주세요.');
    return;
  }
  
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    alert('이 브라우저는 음성 녹음을 지원하지 않습니다.');
    return;
  }
  
  aiModal.classList.add('open');
  aiModalTitle.textContent = '음성 인식 중...';
  aiListening.classList.remove('hidden');
  aiResult.classList.add('hidden');
  aiButtons.classList.add('hidden');
  audioChunks = [];
  
  navigator.mediaDevices.getUserMedia({audio: true})
  .then(function(stream){
    _log('RECORD: started');
    mediaRecorder = new MediaRecorder(stream);
    
    mediaRecorder.ondataavailable = function(e){
      audioChunks.push(e.data);
    };
    
    mediaRecorder.onstop = function(){
      _log('RECORD: stopped, chunks='+audioChunks.length);
      var audioBlob = new Blob(audioChunks, {type: 'audio/webm'});
      stream.getTracks().forEach(function(track){track.stop();});
      
      transcribeWithWhisper(audioBlob, function(transcript){
        parseWithGPT(transcript, function(parsed){
          displayAIResult(parsed);
        });
      });
    };
    
    mediaRecorder.start();
    
    setTimeout(function(){
      if(mediaRecorder && mediaRecorder.state === 'recording'){
        mediaRecorder.stop();
      }
    }, 5000);
  })
  .catch(function(err){
    _log('RECORD-ERROR: '+err.message);
    alert('마이크 접근 오류: '+err.message);
    aiModal.classList.remove('open');
  });
}

function displayAIResult(parsed){
  var now = new Date();
  
  if(parsed.baby) aiBabySelect.value = parsed.baby;
  else aiBabySelect.value = selectedBaby;
  
  if(parsed.hour !== null && parsed.minute !== null){
    aiHourSelect.value = pad2(parsed.hour);
    aiMinuteSelect.value = pad2(parsed.minute);
  } else {
    aiHourSelect.value = pad2(now.getHours());
    aiMinuteSelect.value = pad2(Math.floor(now.getMinutes()/5)*5);
  }
  
  if(parsed.unit){
    aiUnitSelect.value = parsed.unit;
    aiVolumeField.style.display = 'flex';
  } else if(parsed.poop && !parsed.volume){
    aiUnitSelect.value = 'none';
    aiVolumeField.style.display = 'none';
  } else {
    aiUnitSelect.value = selectedUnit || 'ml';
    aiVolumeField.style.display = 'flex';
  }
  
  if(parsed.volume){
    aiVolumeInput.value = parsed.volume;
  } else {
    aiVolumeInput.value = volumeInput.value || '';
  }
  
  aiPoopCheckbox.checked = parsed.poop || false;
  
  aiModalTitle.textContent = '인식 결과 확인';
  aiListening.classList.add('hidden');
  aiResult.classList.remove('hidden');
  aiButtons.classList.remove('hidden');
}

btnAI.addEventListener('click', function(){
  if(!openaiApiKey){
    alert('OpenAI API 키를 먼저 저장해주세요.');
    return;
  }
  initAISelects();
  startVoiceRecording();
});

aiUnitSelect.addEventListener('change', function(){
  if(aiUnitSelect.value === 'none'){
    aiVolumeField.style.display = 'none';
  } else {
    aiVolumeField.style.display = 'flex';
  }
});

aiCancelBtn.addEventListener('click', function(){
  aiModal.classList.remove('open');
  if(recognition) recognition.abort();
});

aiRetryBtn.addEventListener('click', function(){
  startVoiceRecording();
});

aiConfirmBtn.addEventListener('click', function(){
  var baby = aiBabySelect.value;
  var hour = aiHourSelect.value;
  var minute = aiMinuteSelect.value;
  var unit = aiUnitSelect.value;
  var volume = aiVolumeInput.value;
  var poop = aiPoopCheckbox.checked;
  
  if(!baby){
    alert('아기를 선택해주세요.');
    return;
  }
  
  if(unit !== 'none' && !volume){
    alert('용량을 입력해주세요.');
    return;
  }
  
  if(unit === 'none' && !poop){
    alert('기록할 내용이 없습니다.');
    return;
  }
  
  var time = hour + ':' + minute;
  var vol = unit === 'none' ? 0 : parseInt(volume) || 0;
  
  aiModal.classList.remove('open');
  
  addLog(baby, time, unit === 'none' ? '' : unit, vol, poop);
  _log('AI-ADDED: baby='+baby+' time='+time+' unit='+unit+' vol='+vol+' poop='+poop);
});

} catch(ex) {
  var db2=document.getElementById('debug-box');
  if(db2)db2.textContent='ERROR: '+ex.message+'\n'+ex.stack;
}
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>쌍둥이 수유기록</title>
  <style>
    :root {
      /* Backgrounds */
      --bg: #FFFFFF;
      --bg-subtle: #F7F6F3;
      --bg-hover: #EFEEEB;

      /* Borders */
      --border: #E9E9E7;
      --border-subtle: #F1F0EE;

      /* Text */
      --text-1: #37352F;
      --text-2: #787774;
      --text-3: #ADABA8;

      /* Baby 1 (첫째) — soft blue */
      --c1: #4878B0;
      --c1-light: #EEF3FB;
      --c1-border: #BDD0EE;

      /* Baby 2 (둘째) — soft rose */
      --c2: #BC4F67;
      --c2-light: #FBF0F2;
      --c2-border: #EFC5CF;

      /* Both — soft purple */
      --c-both: #7B68AE;
      --c-both-light: #F3F1FB;

      /* Interactive */
      --ink: #37352F;
      --ink-text: #FFFFFF;
      --dim: #E9E9E7;
      --dim-text: #ADABA8;

      /* Semantic */
      --error: #C44569;
      --nap-bg: #FDFBE8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #222; color: var(--text-1); font-size: 16px; -webkit-text-size-adjust: 100%;
      display: flex; justify-content: center; align-items: stretch; min-height: 100vh;
    }
    #root {
      height: 100vh;
      width: 100%;
      max-width: 430px;       /* 모바일(아이폰 Pro Max 기준) 폭 제한 */
      background: var(--bg);
      display: flex; flex-direction: column;
      box-shadow: 0 0 24px rgba(0,0,0,0.15);
    }
    /* 실제 모바일 기기(또는 좁은 뷰포트)에서는 그림자/여백 제거 */
    @media (max-width: 430px) {
      body { background: var(--bg); }
      #root { box-shadow: none; max-width: 100%; }
    }

    /* 숫자 입력 up/down 스피너 제거 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

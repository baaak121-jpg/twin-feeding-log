<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>쌍둥이 수유기록</title>
  <style>
    :root {
      /* Backgrounds */
      --bg: #FFFFFF;
      --bg-subtle: #F7F6F3;
      --bg-hover: #EFEEEB;

      /* Borders */
      --border: #E9E9E7;
      --border-subtle: #F1F0EE;

      /* Text */
      --text-1: #37352F;
      --text-2: #787774;
      --text-3: #ADABA8;

      /* Baby 1 (첫째) — soft blue */
      --c1: #4878B0;
      --c1-light: #EEF3FB;
      --c1-border: #BDD0EE;

      /* Baby 2 (둘째) — soft rose */
      --c2: #BC4F67;
      --c2-light: #FBF0F2;
      --c2-border: #EFC5CF;

      /* Both — soft purple */
      --c-both: #7B68AE;
      --c-both-light: #F3F1FB;

      /* Interactive */
      --ink: #37352F;
      --ink-text: #FFFFFF;
      --dim: #E9E9E7;
      --dim-text: #ADABA8;

      /* Semantic */
      --error: #C44569;
      --nap-bg: #FDFBE8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-1); font-size: 16px; -webkit-text-size-adjust: 100%; }
    #root { height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
